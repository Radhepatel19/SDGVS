name: sdgvs
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.1
  record: ^6.2.0
  path_provider: ^2.1.5
  open_file: ^3.5.11
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.4
  flutter_tts: ^4.2.2
  local_auth: ^2.3.0
  path: ^1.9.1
  http: ^1.2.1
  url_launcher: ^6.3.2
  audioplayers: ^6.0.0
  share_plus: ^12.0.2
  google_generative_ai: ^0.4.6
  flutter_native_splash: ^2.4.7
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/sdgvs-icon.png


flutter_native_splash:
  color: "#ffffff"
  image: assets/images/sdgvs-icon.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/sdgvs-icon.png"
  remove_alpha_ios: true
